<div class="login-container">
  <!-- Left side - Hotel image -->
  <div class="image-section">
    <img src="https://cdn.glitch.global/479735bf-175b-4738-ad16-8a3bbe343e47/iconhotel?v=1750150331474" alt="SUN Hotel Building" class="hotel-image">
  </div>

  <!-- Right side - Signup form -->
  <div class="form-section">
    <div class="login-form">
      <h1 class="welcome-title">Create Your Account</h1>

      <form (ngSubmit)="onSubmit()" #signupForm="ngForm">
        <!-- Username -->
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="Enter username"
            [(ngModel)]="username"
            required
          />
        </div>

        <!-- Full Name -->
        <div class="form-group">
          <label for="fullname" class="form-label">Full name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            class="form-input"
            placeholder="Enter full name"
            [(ngModel)]="fullname"
            required
          />
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="Enter email"
            [(ngModel)]="email"
            required
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter password"
            [(ngModel)]="password"
            required
          />
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label for="phone" class="form-label">Phone</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            class="form-input"
            placeholder="Enter phone number"
            [(ngModel)]="phone"
            required
          />
        </div>

        <!-- Gender -->
        <div class="form-group">
          <label for="gender" class="form-label">Gender</label>
          <select
            id="gender"
            name="gender"
            class="form-input"
            [(ngModel)]="gender"
            required
          >
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
            <option value="Khác">Khác</option>
          </select>
        </div>

        <!-- Nationality -->
        <div class="form-group">
          <label for="nationality" class="form-label">Nationality</label>
          <input
            type="text"
            id="nationality"
            name="nationality"
            class="form-input"
            placeholder="Enter nationality"
            [(ngModel)]="nationality"
            required
          />
        </div>

        <!-- (Ẩn) Role và Status mặc định -->
        <input type="hidden" name="role" [(ngModel)]="role" />
        <input type="hidden" name="status" [(ngModel)]="status" />

        <!-- Sign up button -->
        <button type="submit" class="login-btn" [disabled]="!signupForm.form.valid">
          SIGN UP
        </button>

        <!-- Back to login link -->
        <div class="signup-link">
          Already have an account?
          <a routerLink="/login">LOGIN</a>
        </div>
      </form>
    </div>
  </div>
</div>
