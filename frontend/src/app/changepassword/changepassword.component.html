<div class="login-container">
  <!-- Left side - Hotel image -->
  <div class="image-section">
    <img
      src="https://cdn.glitch.global/479735bf-175b-4738-ad16-8a3bbe343e47/iconhotel?v=1750150331474"
      alt="SUN Hotel Building"
      class="hotel-image"
    />
  </div>

  <!-- Right side - Change password form -->
  <div class="form-section">
    <div class="login-form">
      <h1 class="welcome-title">Change Password</h1>

      <!-- Thông báo thành công/thất bại -->
      <div *ngIf="message" [ngClass]="{
        'success-message': messageType === 'success',
        'error-message': messageType === 'error'
      }" class="message-box">
        {{ message }}
      </div>

      <form (ngSubmit)="onSubmit()" #changeForm="ngForm">
        <!-- Username -->
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="Enter your username"
            [(ngModel)]="username"
            required
          />
        </div>

        <!-- Old password -->
        <div class="form-group">
          <label for="oldPassword" class="form-label">Current Password</label>
          <input
            type="password"
            id="oldPassword"
            name="oldPassword"
            class="form-input"
            placeholder="Enter current password"
            [(ngModel)]="oldPassword"
            required
          />
        </div>

        <!-- New password -->
        <div class="form-group">
          <label for="newPassword" class="form-label">New Password</label>
          <input
            type="password"
            id="newPassword"
            name="newPassword"
            class="form-input"
            placeholder="Enter new password"
            [(ngModel)]="newPassword"
            required
          />
        </div>

        <!-- Confirm new password -->
        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm New Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="form-input"
            placeholder="Confirm new password"
            [(ngModel)]="confirmPassword"
            required
          />
        </div>

        <!-- Submit -->
        <button type="submit" class="login-btn" [disabled]="!changeForm.form.valid">
          Change Password
        </button>

        <!-- Back to login -->
        <div class="signup-link">
          Remembered password? <a routerLink="/login">Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
